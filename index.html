<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 할 일</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --text-main: #333333;
            --text-muted: #888888;
            --primary: #ff7e67;
            --primary-hover: #ff6b52;
            --danger: #ff4757;
            --danger-hover: #ff3344;
            --border-radius: 20px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            box-shadow: var(--glass-shadow);
            padding: 2.5rem 2rem;
            margin: 1.5rem;
            box-sizing: border-box;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 0.5rem 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .input-group input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            border: 2px solid transparent;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            color: var(--text-main);
        }

        .input-group input::placeholder {
            color: #b0b0b0;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 126, 103, 0.2);
            background: white;
        }

        .input-group button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 126, 103, 0.3);
        }

        .input-group button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 126, 103, 0.4);
        }

        .input-group button:active {
            transform: translateY(0);
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 50vh;
            overflow-y: auto;
            /* Scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: #ffd0c7 transparent;
        }

        .todo-list::-webkit-scrollbar {
            width: 6px;
        }
        .todo-list::-webkit-scrollbar-thumb {
            background-color: #ffd0c7;
            border-radius: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.2rem;
            background: white;
            margin-bottom: 0.8rem;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease forwards;
        }

        .todo-item:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.08);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #c0c0c0;
        }
        
        .todo-item.completed {
            background: rgba(255, 255, 255, 0.6);
            box-shadow: none;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .todo-content {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            overflow: hidden;
            cursor: pointer;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #e0e0e0;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            background: white;
        }

        .todo-item:hover .checkbox {
            border-color: var(--primary);
        }

        .todo-item.completed .checkbox {
            background: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .checkbox svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .todo-item.completed .checkbox svg {
            opacity: 1;
            transform: scale(1);
        }

        .todo-text {
            font-size: 1.05rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.3s ease;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: #dcdcdc;
            cursor: pointer;
            padding: 8px;
            margin-left: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            color: var(--danger);
            background: rgba(255, 71, 87, 0.1);
        }

        .delete-btn svg {
            width: 20px;
            height: 20px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 2rem;
            padding: 2rem 0;
            font-size: 1.05rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
                margin: 1rem;
                border-radius: 24px;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .input-group button {
                padding: 0 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>나의 할 일</h1>
            <p id="taskCount">0개 남음</p>
        </div>

        <form id="todoForm" class="input-group">
            <input type="text" id="todoInput" placeholder="어떤 일을 해야 하나요?" autocomplete="off">
            <button type="submit">추가</button>
        </form>

        <ul id="todoList" class="todo-list">
            <!-- Todo items will be inserted here -->
        </ul>
        
        <div id="emptyState" class="empty-state">
            <p>할 일이 없습니다! 좋은 하루 보내세요. ✨</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const todoForm = document.getElementById('todoForm');
            const todoInput = document.getElementById('todoInput');
            const todoList = document.getElementById('todoList');
            const taskCount = document.getElementById('taskCount');
            const emptyState = document.getElementById('emptyState');

            // Load from LocalStorage
            let todos = JSON.parse(localStorage.getItem('my_todos')) || [];

            function saveTodos() {
                localStorage.setItem('my_todos', JSON.stringify(todos));
            }

            function updateUI() {
                todoList.innerHTML = '';
                
                if (todos.length === 0) {
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    todos.forEach(todo => {
                        const li = document.createElement('li');
                        li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                        li.dataset.id = todo.id;

                        li.innerHTML = `
                            <div class="todo-content" onclick="toggleTodo(${todo.id})">
                                <div class="checkbox">
                                    <svg viewBox="0 0 24 24">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </div>
                                <span class="todo-text">${escapeHTML(todo.text)}</span>
                            </div>
                            <button class="delete-btn" onclick="deleteTodo(${todo.id})" aria-label="Delete">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        `;
                        todoList.appendChild(li);
                    });
                }

                const remaining = todos.filter(t => !t.completed).length;
                taskCount.textContent = `${remaining}개 남음`;
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag])
                );
            }

            window.toggleTodo = function(id) {
                const todo = todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    saveTodos();
                    updateUI();
                }
            };

            window.deleteTodo = function(id) {
                const li = document.querySelector(`.todo-item[data-id="${id}"]`);
                if (li) {
                    li.style.transform = 'scale(0.9) translateY(10px)';
                    li.style.opacity = '0';
                    setTimeout(() => {
                        todos = todos.filter(t => t.id !== id);
                        saveTodos();
                        updateUI();
                    }, 300);
                } else {
                    todos = todos.filter(t => t.id !== id);
                    saveTodos();
                    updateUI();
                }
            };

            todoForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = todoInput.value.trim();
                
                if (text) {
                    todos.push({
                        id: Date.now(),
                        text,
                        completed: false
                    });
                    
                    todoInput.value = '';
                    saveTodos();
                    updateUI();
                }
            });

            // Initial render
            updateUI();
        });
    </script>
</body>
</html>
